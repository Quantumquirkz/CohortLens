[project]
name = "cohortlens-backend-ai"
version = "0.3.0"
description = "CohortLens FastAPI backend"
requires-python = ">=3.11"

[tool.ruff]
target-version = "py311"
src = ["app", "tests"]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008", "E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
# web3 ships a pytest plugin that conflicts with newer eth_typing; we do not use it.
addopts = "-p no:pytest_ethereum"
