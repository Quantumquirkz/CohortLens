type User @entity(immutable: false) {
  id: ID!
  address: Bytes!
  """First Aave v3 operation block (risk / wallet-age proxy)."""
  firstActivityBlock: BigInt
  """Most recent Aave v3 operation block."""
  lastActivityBlock: BigInt
  depositCount: BigInt
  withdrawCount: BigInt
  borrowCount: BigInt
  repayCount: BigInt
  totalDepositVolume: BigInt
  totalWithdrawVolume: BigInt
  totalBorrowVolume: BigInt
  totalRepayVolume: BigInt
  deposits: [Deposit!]! @derivedFrom(field: "user")
  withdrawals: [Withdrawal!]! @derivedFrom(field: "user")
  borrows: [Borrow!]! @derivedFrom(field: "user")
  repayments: [Repayment!]! @derivedFrom(field: "user")
}

type Deposit @entity(immutable: true) {
  id: ID!
  user: User!
  reserve: Bytes!
  amount: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  logIndex: BigInt!
  gasUsed: BigInt!
}

type Withdrawal @entity(immutable: true) {
  id: ID!
  user: User!
  reserve: Bytes!
  to: Bytes!
  amount: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  logIndex: BigInt!
  gasUsed: BigInt!
}

type Borrow @entity(immutable: true) {
  id: ID!
  user: User!
  reserve: Bytes!
  amount: BigInt!
  interestRateMode: Int!
  blockNumber: BigInt!
  txHash: Bytes!
  logIndex: BigInt!
  gasUsed: BigInt!
}

type Repayment @entity(immutable: true) {
  id: ID!
  user: User!
  reserve: Bytes!
  repayer: Bytes!
  amount: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  logIndex: BigInt!
  gasUsed: BigInt!
}
