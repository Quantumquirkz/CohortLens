specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Pool
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: Pool
      startBlock: 19000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Deposit
      abis:
        - name: Pool
          file: ../polygon/abis/Pool.json
      file: ../polygon/src/mapping.ts
