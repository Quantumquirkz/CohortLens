services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cohortlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-cohortlens}
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cohortlens} -d ${POSTGRES_DB:-cohortlens}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-graph:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${GRAPH_POSTGRES_USER:-graph-node}
      POSTGRES_PASSWORD: ${GRAPH_POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${GRAPH_POSTGRES_DB:-graph-node}
    ports:
      - "5433:5432"
    volumes:
      - postgres_graph_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRAPH_POSTGRES_USER:-graph-node} -d ${GRAPH_POSTGRES_DB:-graph-node}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ipfs:
    image: ipfs/kubo:v0.24.0
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs

  graph-node:
    image: graphprotocol/graph-node:v0.34.1
    depends_on:
      postgres-graph:
        condition: service_healthy
      ipfs:
        condition: service_started
    ports:
      - "8020:8000"
      - "8030:8030"
      - "8040:8040"
    environment:
      postgres_host: postgres-graph
      postgres_user: ${GRAPH_POSTGRES_USER:-graph-node}
      postgres_pass: ${GRAPH_POSTGRES_PASSWORD:-change-me}
      postgres_db: ${GRAPH_POSTGRES_DB:-graph-node}
      ipfs: "ipfs:5001"
      # Point to your Polygon RPC; placeholder for local subgraph development.
      ethereum: "polygon:${POLYGON_RPC_URL:-https://polygon-rpc.com/}"

  backend-ai:
    build:
      context: ./packages/backend-ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    environment:
      DATABASE_URL: postgresql://cohortlens:cohortlens@postgres:5432/cohortlens
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SUBGRAPH_URL: ${SUBGRAPH_URL:-http://graph-node:8000/subgraphs/name/cohortlens/aave-v3}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-https://rpc.sepolia.org}
      COHORT_ORACLE_ADDRESS: ${COHORT_ORACLE_ADDRESS:-}
      COHORT_LENS_ID: ${COHORT_LENS_ID:-0}
      ORACLE_REQUESTER_PRIVATE_KEY: ${ORACLE_REQUESTER_PRIVATE_KEY:-}
      IPFS_API_URL: http://ipfs:5001
      COHORT_REGISTRY_ADDRESS: ${COHORT_REGISTRY_ADDRESS:-}
      REGISTRY_UPLOADER_PRIVATE_KEY: ${REGISTRY_UPLOADER_PRIVATE_KEY:-}
      MODEL_CACHE_DIR: /var/cache/cohortlens-models
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      REQUIRE_WALLET_AUTH: ${REQUIRE_WALLET_AUTH:-false}
      CHAINS_JSON: ${CHAINS_JSON:-}
      ORACLE_SCAN_CHAIN: ${ORACLE_SCAN_CHAIN:-polygon}
      REQUIRE_LENS_PAYMENT_FOR_DISCOVER: ${REQUIRE_LENS_PAYMENT_FOR_DISCOVER:-false}
      REQUIRE_STAKE_FOR_UPLOAD: ${REQUIRE_STAKE_FOR_UPLOAD:-false}
      ENABLE_ZK_PROOF_FOR_ONNX: ${ENABLE_ZK_PROOF_FOR_ONNX:-false}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_ALLOWED_REPOS: ${HF_ALLOWED_REPOS:-*}
      POSTGREST_JWT_SECRET: ${POSTGREST_JWT_SECRET:-}
      GRADIO_INTERNAL_API_KEY: ${GRADIO_INTERNAL_API_KEY:-}
    volumes:
      - model_cache:/var/cache/cohortlens-models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ipfs:
        condition: service_started
      graph-node:
        condition: service_started

  celery-worker:
    build:
      context: ./packages/backend-ai
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q ml_tasks,prediction_tasks,zk_tasks
    environment:
      DATABASE_URL: postgresql://cohortlens:cohortlens@postgres:5432/cohortlens
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHAINS_JSON: ${CHAINS_JSON:-}
      ORACLE_SCAN_CHAIN: ${ORACLE_SCAN_CHAIN:-polygon}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-https://rpc.sepolia.org}
      COHORT_ORACLE_ADDRESS: ${COHORT_ORACLE_ADDRESS:-}
      ORACLE_OWNER_PRIVATE_KEY: ${ORACLE_OWNER_PRIVATE_KEY:-}
      ORACLE_FROM_BLOCK: ${ORACLE_FROM_BLOCK:-0}
      ORACLE_SCAN_CHUNK_BLOCKS: ${ORACLE_SCAN_CHUNK_BLOCKS:-2000}
      IPFS_API_URL: http://ipfs:5001
      COHORT_REGISTRY_ADDRESS: ${COHORT_REGISTRY_ADDRESS:-}
      MODEL_CACHE_DIR: /var/cache/cohortlens-models
    volumes:
      - model_cache:/var/cache/cohortlens-models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ipfs:
        condition: service_started

  celery-beat:
    build:
      context: ./packages/backend-ai
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-https://rpc.sepolia.org}
      COHORT_ORACLE_ADDRESS: ${COHORT_ORACLE_ADDRESS:-}
      ORACLE_OWNER_PRIVATE_KEY: ${ORACLE_OWNER_PRIVATE_KEY:-}
      ORACLE_FROM_BLOCK: ${ORACLE_FROM_BLOCK:-0}
      ORACLE_SCAN_CHUNK_BLOCKS: ${ORACLE_SCAN_CHUNK_BLOCKS:-2000}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_GRADIO_URL: ${NEXT_PUBLIC_GRADIO_URL:-http://localhost:7860}
      NEXT_PUBLIC_LENS_TOKEN_ADDRESS: ${NEXT_PUBLIC_LENS_TOKEN_ADDRESS:-}
      NEXT_PUBLIC_STAKING_ADDRESS: ${NEXT_PUBLIC_STAKING_ADDRESS:-}
      NEXT_PUBLIC_COHORT_ORACLE_ADDRESS: ${NEXT_PUBLIC_COHORT_ORACLE_ADDRESS:-}
      NEXT_PUBLIC_COHORT_GOVERNOR_ADDRESS: ${NEXT_PUBLIC_COHORT_GOVERNOR_ADDRESS:-}

  postgrest:
    profiles: ["labs"]
    image: postgrest/postgrest:v12.2.3
    depends_on:
      postgres:
        condition: service_healthy
      backend-ai:
        condition: service_healthy
    ports:
      - "3003:3000"
    environment:
      PGRST_DB_URI: postgres://postgrest_authenticator:postgrest_dev_change_me@postgres:5432/cohortlens
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: postgrest_anon
      PGRST_SERVER_PORT: 3000
      PGRST_JWT_SECRET: ${POSTGREST_JWT_SECRET:-}

  gradio-lab:
    profiles: ["labs"]
    build:
      context: ./packages/gradio-lab
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      BACKEND_API_URL: http://backend-ai:8000
      GRADIO_INTERNAL_API_KEY: ${GRADIO_INTERNAL_API_KEY:-}
    depends_on:
      backend-ai:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./packages/backend-ai/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - backend-ai

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  postgres_graph_data:
  redis_data:
  ipfs_data:
  model_cache:
