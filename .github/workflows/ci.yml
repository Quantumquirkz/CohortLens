name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: solhint
        run: |
          npm install
          npm run lint:sol

      - name: Forge fmt
        run: forge fmt --check

      - name: Forge build
        run: forge build

      - name: Forge test
        run: forge test -vvv

      - name: Forge coverage gate
        env:
          MIN_COVERAGE_PCT: "45"
        run: |
          cd "$GITHUB_WORKSPACE"
          bash scripts/check-forge-coverage.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Slither
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer
          slither . --fail-high

      - name: Mythril (LensToken sample)
        continue-on-error: true
        run: |
          python -m pip install mythril
          set -o pipefail
          myth analyze src/LensToken.sol --execution-timeout 240 -o json | python "$GITHUB_WORKSPACE/scripts/mythril_gate.py"

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend-ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/backend-ai/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check tests

      - name: Pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/frontend/package-lock.json

      - name: Install and test
        run: |
          npm ci
          npm run lint
          npm test -- --ci
          npm run build

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build docs
        run: |
          npm install
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f packages/backend-ai/Dockerfile.prod -t cohortlens-backend:ci packages/backend-ai

      - name: Build frontend image
        run: docker build -f packages/frontend/Dockerfile.prod -t cohortlens-frontend:ci packages/frontend
